<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body { padding: 40px; font-family: sans-serif; }
        
        /* Your specific class */
        .pythoncode {
            background-color: #f9f9f9;
            border: 2px solid #000;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
        }

        #result {
            font-weight: bold;
            color: #007bff;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="pythoncode">
        <h3>Live Math Machine</h3>
        
        <script type="py">
            from pyscript import display

            # Rule: CAPITAL LETTERS for variables
            PRICE = 20
            UNITS = 5
            TOTAL = PRICE * UNITS

            # This tells Python exactly where to put the text
            display(f"The TOTAL is: {TOTAL}", target="result", append=False)
        </script>

        <div id="result">Waiting for Python...</div>
    </div>

</body>
</html>
