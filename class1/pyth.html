<!DOCTYPE html>
<html>
<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>

    <style>
        .pythoncode {
            background-color: #1e1e1e;
            color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            max-width: 600px;
            font-family: 'Courier New', Courier, monospace;
            margin: 20px auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        #code-input {
            width: 100%;
            height: 326px;
            background-color: #2d2d2d;
            color: #00ff00;
            border: 1px solid #444;
            padding: 15px;
            font-size: 0.7rem;
            border-radius: 5px;
            box-sizing: border-box;
            outline: none;
            resize: vertical;
        }

        #output-window {
            background-color: #000;
            color: #fff;
            padding: 15px;
            min-height: 25px;
            margin-top: 10px;
            border-radius: 5px;
            white-space: pre-wrap;
            border-left: 4px solid #00ff00;
            font-size: 0.95rem;
        }

        button {
            margin-top: 10px;
            background-color: #00ff00;
            color: #000;
            border: none;
            padding: 10px 25px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { 
            background-color: #00cc00; 
        }

        h3 { margin-top: 0; }
    </style>
</head>
<body>

    <div class="pythoncode">
        <h3>🧠 Machine Mind</h3>
      <p style="color: #ccc; font-size: 0.8rem;">Click <strong>RUN CODE</strong> to execute this Python code:</p>
        
        <textarea id="code-input">
# LESSON 1

INPUT  = 0.60
TARGET = 3.00   
          
WEIGHT = 0.00
          
PRODUCT = INPUT * WEIGHT       
OUTPUT  = PRODUCT
ERROR   = TARGET - OUTPUT
          
WEIGHT_UPDATE = ERROR
WEIGHT = WEIGHT + WEIGHT_UPDATE         

print(f"WEIGHT = {WEIGHT}")
        </textarea>
        
        <button onclick="runPython()">RUN CODE</button>
        
        <div id="output-window">Ready for math!</div>
    </div>

    <script>
        function outf(text) {
            var mypre = document.getElementById("output-window");
            mypre.innerHTML = mypre.innerHTML + text;
        }

        function runPython() {
            var code = document.getElementById("code-input").value;
            var mypre = document.getElementById("output-window");
            mypre.innerHTML = ''; 
            
            Sk.pre = "output-window";
            Sk.configure({output:outf});
            
            var myPromise = Sk.misceval.asyncToPromise(function() {
                return Sk.importMainWithBody("<stdin>", false, code, true);
            });

            myPromise.then(function(mod) {
                console.log('Success!');
            }, function(err) {
                mypre.innerHTML = err.toString();
            });
        }
        
        // window.onload is removed so it stays silent until clicked!
    </script>

</body>
</html>


</body>
