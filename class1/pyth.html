<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.0/full/pyodide.js"></script>

    <style>
        .pythoncode {
            background-color: #2d2d2d;
            color: #fff;
            padding: 20px;
            border-radius: 12px;
            max-width: 500px;
            font-family: monospace;
        }
        #terminal {
            background: #000;
            color: #0f0;
            padding: 15px;
            min-height: 100px;
            margin-top: 10px;
            border-radius: 5px;
            white-space: pre-wrap;
        }
        textarea { width: 100%; height: 80px; margin-top: 10px; }
        button { margin-top: 10px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="pythoncode">
        <h3>Python Sandbox</h3>
        <textarea id="code">
# Edit this and click Run!
PRICE_PER_UNIT = 10
UNITS = 5
TOTAL = PRICE_PER_UNIT * UNITS
print(f"The TOTAL is: {TOTAL}")
        </textarea>
        <button onclick="evaluatePython()">Run Code</button>
        <div id="terminal">Output will appear here...</div>
    </div>

    <script>
        async function main() {
            let pyodide = await loadPyodide();
            document.getElementById("terminal").innerText = "Ready to run!";
            return pyodide;
        }
        let pyodideReadyPromise = main();

        async function evaluatePython() {
            let pyodide = await pyodideReadyPromise;
            let code = document.getElementById("code").value;
            let terminal = document.getElementById("terminal");
            terminal.innerText = "Running...";
            
            // Redirect print to our terminal
            pyodide.runPython(`
import sys
import io
sys.stdout = io.StringIO()
            `);
            
            try {
                pyodide.runPython(code);
                let output = pyodide.runPython("sys.stdout.getvalue()");
                terminal.innerText = output;
            } catch (err) {
                terminal.innerText = err;
            }
        }
    </script>
</body>
</html>
